# Render blueprint for the ad-shark backend + its Postgres database.
# Near one-click: provisions Postgres, wires DATABASE_URL, and start.sh migrates +
# seeds on boot. The frontend deploys separately on Vercel.
databases:
  - name: adshark-db
    plan: free

services:
  - type: web
    name: adshark-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET_KEY
        generateValue: true              # Render generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: adshark-db
          property: connectionString     # app normalizes postgres:// → asyncpg automatically
      - key: CORS_ORIGINS
        sync: false                      # JSON list, e.g. ["https://ad-shark-xxx.vercel.app"]
# Note: the app does not use Redis, so no REDIS_URL is needed.
